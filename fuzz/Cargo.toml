
[package]
name = "retina-fuzz"
version = "0.0.0"
authors = ["Automatically generated"]
publish = false
edition = "2024"
rust-version = "1.88"

[package.metadata]
cargo-fuzz = true

[dependencies]
bytes = "1"
derive_more = { version = "2", features = ["debug"] }
libfuzzer-sys = { version = "0.4", features = ["arbitrary-derive"] }
log = "0.4.29"
pretty-hex = "0.4.0"
memchr = "2.7.4"
mylog = { git = "https://github.com/scottlamb/mylog" }

[dependencies.retina]
path = ".."
features = ["h265"]

[[bin]]
name = "depacketize_h264"
path = "fuzz_targets/depacketize_h264.rs"
test = false
doc = false

[[bin]]
name = "depacketize_h265"
path = "fuzz_targets/depacketize_h265.rs"
test = false
doc = false

[[bin]]
name = "roundtrip_h264"
path = "fuzz_targets/roundtrip_h264.rs"
test = false
doc = false

[[bin]]
name = "depacketize_jpeg"
path = "fuzz_targets/depacketize_jpeg.rs"
test = false
doc = false

[[bin]]
name = "h265_nal"
path = "fuzz_targets/h265_nal.rs"
test = false
doc = false
